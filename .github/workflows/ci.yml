# .github/workflows/ci.yml

name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test: # Одна большая задача, которая делает всё
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Шаг с линтером
      - name: Run Linter
        run: npm run lint

      # Шаг с тестами
      - name: Run Tests
        run: npm test

      # Шаг со сборкой
      - name: Build Project
        run: npm run build
